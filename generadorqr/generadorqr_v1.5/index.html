<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Generador QR | Navaja Suiza</title>

  <link rel="icon" href="../../assets/logo.png">
  <link rel="stylesheet" href="./qr_style.css">

</head>

<body class="dark">

  <header class="ns-header">
    <a href="https://lalita635dev-prog.github.io/navaja-suiza/" class="breadcrumb">
      <span id="toolName">
        🔧 Herramienta
      </span>
    </a>
  </header>

  <main class="tool-container">
    <div class="container">
      <div class="top-bar">
        <h1 class="tool-title">🔳 Generador de QR</h1>
        <button id="themeToggle">🌙</button>
      </div>

      <!-- INPUT + GENERAR -->
      <input type="text" id="urlInput" placeholder="Ingresá tu link..." />
      <button class="main-btn" onclick="generateQR()">Generar QR</button>

      <!-- QR -->
      <div id="qrContainer" class="fade"></div>

      <!-- ACCIONES -->
      <div class="buttons">
        <button onclick="downloadQR('png')">Descargar PNG</button>
        <button onclick="downloadQR('svg')">Descargar SVG</button>
        <button onclick="copyQR()">Copiar</button>
      </div>

      <!-- LOGO -->
      <div class="control-block">
        <h3>Agregá tu Logo</h3>
        <div id="dropZone">Arrastra la imagen o hacer click para agregar</div>
        <input type="file" id="logoInput" accept="image/*" hidden>
        <span id="fileName">Sin logo</span>
      </div>

      <!-- COLOR -->
      <div class="control-block">
        <h3>Cambiar el color del QR</h3>
        <input type="color" id="colorPicker" value="#000000">
      </div>

      <!-- RESET -->
      <button class="reset-btn" onclick="resetAll()">Reset</button>

      <p id="error"></p>

    </div>
  </main>

  <!-- FOOTER GLOBAL -->

  <footer class="ns-footer">
    <p>
      © 2026 By 
      <a href="https://lalita.dev.ar/" target="_blank" class="footer-link">🌐 Lalita</a> | 
      <a href="http://bit.ly/4fS0yUa" target="_blank" class="footer-link">💪Forma parte de nuestro Staff</a> | 
      <a href="example.zip" target="_blank" class="footer-link">🔗 Quiero esta herramienta</a>
    </p>
      <div class="footer-buttons">
      <a href="https://lalita635dev-prog.github.io/navaja-suiza/" class="footer-btn">🏠 Inicio</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
