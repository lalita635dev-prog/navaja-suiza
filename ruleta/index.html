<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ruleta | Navaja Suiza</title>

  <link rel="icon" href="../../assets/logo.png">
  <link rel="stylesheet" href="./ruleta_style.css">

</head>

<body>

    <header class="ns-header">
    <a href="https://lalita635dev-prog.github.io/navaja-suiza/" class="breadcrumb">
      <span id="toolName">
        🔧 Herramienta
      </span>
    </a>
  </header>

  <main class="tool-container">
    <div class="container">
      <h1 class="tool-title">🎡 Ruleta de Opciones</h1>

    <div class="pointer"></div>
    <canvas id="wheel"></canvas>

    <br>
    <div class="actions"><button onclick="spin()">Girar</button></div>

    <h3>Opciones</h3>
    <input id="newOption" placeholder="Nueva opción">
    <div class="actions"><button onclick="addOption()">Agregar</button></div>

    <br>
    <textarea id="optionsBox" oninput="syncFromTextarea()"></textarea><br>
    <div class="actions">
        <button onclick="exportJSON()">📤 Exportar</button>

        <label class="file-label">
            📥 Importar
            <input type="file" onchange="importJSON(event)" hidden>
        </label>
    </div>
    <span id="fileName" style="font-size:12px; color:#aaa;"></span>

    <!-- Modal -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2>🏆 Resultado</h2>
            <p id="resultText"></p>

            <div class="actions">
                <button onclick="removeWinner()">Eliminar opción</button>
                <button class="close-btn" onclick="closeModal()">Cerrar</button>
            </div>
        </div>
    </div>
    </div>
  </main>

<!-- FOOTER GLOBAL -->
    <footer class="ns-footer">
    <p>

      <a href="https://lalita.dev.ar/" target="_blank" class="footer-link">🌐 Lalita</a> |

      <a href="example.zip" target="_blank" class="footer-link">🔗 Quiero esta herramienta</a>
    </p>
      <div class="footer-buttons">
      <a href="https://lalita635dev-prog.github.io/navaja-suiza/" class="footer-btn">🏠 Inicio</a>
    </div>
  </footer>
<script src="script.js"></script>
</body>

</html>
