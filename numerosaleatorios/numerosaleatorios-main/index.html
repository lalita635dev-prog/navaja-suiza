<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Números Aleatorios | By Lalita635</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>🎲 Generador de Números</h1>

    <div class="card">
        <label>Mínimo</label>
        <input type="number" id="min" placeholder="Ej: 1">

        <label>Máximo</label>
        <input type="number" id="max" placeholder="Ej: 100">

        <label>Cantidad de números</label>
        <input type="number" id="count" placeholder="Ej: 5">

        <button id="generateBtn">Generar</button>
    </div>

    <div class="result-card">
        <h2>Resultado</h2>
        <div id="result"></div>
    </div>

    <p class="footer">By LTA</p>
</div>

<script src="script.js"></script>
</body>
</html>
