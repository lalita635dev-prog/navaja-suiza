<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bolillero | Navaja Suiza</title>

  <link rel="icon" href="../../assets/logo.png">
  <link rel="stylesheet" href="./bolillero_styles.css">

</head>

<body>
  <header class="ns-header">

    <a href="https://lalita635dev-prog.github.io/navaja-suiza/" class="breadcrumb">

      <span id="toolName">
        🔧 Herramienta
      </span>

    </a>

  </header>


  <div class="container">
    <h1 class="tool-title">🎱 Bolillero</h1>

    <div class="controls">
      <label>Total de bolillas</label>
      <input type="number" id="totalBalls" value="90" min="1">

      <label>Bolillas por tirada</label>
      <input type="number" id="drawCount" value="1" min="1">

      <button id="resetBtn">Reiniciar</button>
    </div>

    <div class="machine" id="machine">
      <div class="balls" id="balls"></div>
    </div>

    <div class="result" id="result"></div>

    <div class="history">
      <h3>Historial</h3>
      <div id="history"></div>
    </div>

    <p class="hint">Arrastrá hacia abajo para sacar bolillas</p>
  </div>

  <!-- FOOTER GLOBAL -->

  <footer class="ns-footer">

    <p>
      © 2026 By Lalita
    </p>

    <a href="https://lalita.dev.ar/" target="_blank" class="footer-link">

      🌐 lalita.dev.ar

    </a>

    <div class="footer-buttons">

      <a href="example.zip" target="_blank" class="footer-btn">

        📦 Descargar Código

      </a>

      <a href="https://lalita635dev-prog.github.io/navaja-suiza/" class="footer-btn">

        🏠 Inicio

      </a>

    </div>

  </footer>

  <script src="script.js"></script>
</body>

</html>
